<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Market Pulse AI</title><link rel="stylesheet" href="/style.css"></head><body><main>
<header><div><span class="eyebrow">MULTI-MARKET DIRECTIONAL RADAR</span><h1 data-i18n="title">全市場漲跌異動雷達 <i>AI</i></h1></div><div class="live"><b></b> <span data-i18n="autoScan">每分鐘自動掃描</span></div></header>
<section class="controls"><span data-i18n="frames">分析 <b>5m／15m／30m</b></span>
<select id="language" aria-label="Language"><option value="zh">繁體中文</option><option value="en">English</option><option value="es">Español</option><option value="ja">日本語</option><option value="ko">한국어</option></select>
<select id="filter"><option value="all" data-i18n="filter.all">全部機會</option><option value="高波動貨幣" data-i18n="filter.volatile">高波動小幣（含 B）</option><option value="potential5" data-i18n="filter.potential">單日潛力 ≥5%</option><option value="early" data-i18n="filter.early">預先蓄勢／轉弱</option><option value="reversal" data-i18n="filter.reversal">暴漲跌後反轉</option><option value="加密貨幣" data-i18n="filter.crypto">大型加密貨幣</option><option value="外匯" data-i18n="filter.fx">外匯</option><option value="商品" data-i18n="filter.commodity">黃金／原油</option></select>
<span id="universe" data-i18n="preparing">準備掃描市場…</span><button id="alarm" data-i18n="enableAlarm">開啟警報</button><button id="refresh" data-i18n="scanNow">立即掃描</button></section>
<section class="hero"><div><small data-i18n="strongest">目前最強異動候選</small><strong id="leader">—</strong><span id="reason" data-i18n="scanning">正在掃描多市場</span></div><div class="score"><small data-i18n="confidence">模型信心</small><strong id="score">—</strong><span id="verdict" data-i18n="analyzing">分析中</span></div></section>
<section class="grid"><article class="chart"><div class="title"><h2 data-i18n="ranking">全市場候選排行</h2><span id="updated">—</span></div><div class="thead"><span data-i18n="asset">標的</span><span>5m</span><span>15m</span><span>30m</span><span data-i18n="total">綜合</span></div><div id="rankingList"></div></article>
<article><h2 data-i18n="model">預判模型</h2><div class="summary"><p data-i18n="model.1">• 上漲前蓄勢／下跌前轉弱</p><p data-i18n="model.2">• 暴漲後回撤／暴跌後反彈</p><p data-i18n="model.3">• 估算單日波動潛力 ≥5%</p><p data-i18n="model.4">• 突破位置、RSI、ATR、波動率與量能</p></div></article>
<article><h2 data-i18n="planTitle">目前訊號與交易計畫</h2><div id="summary" class="summary" data-i18n="loading">載入市場資料中…</div><p class="disclaimer" data-i18n="disclaimer">所有點位皆為模型情境，不是報酬保證；僅供研究，不構成投資建議。</p></article>
<article class="watch"><div class="title"><h2 data-i18n="watchTitle">我的即時關注清單</h2><span data-i18n="watchRefresh">每分鐘獨立更新</span></div><div id="watchlist"></div></article></section>
</main><script src="/app.js"></script></body></html>
